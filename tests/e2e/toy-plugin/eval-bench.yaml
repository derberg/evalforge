plugin:
  path: ./
provider:
  command: node
  extraArgs: ['fake-claude.js']
  timeout: 10
  # Opt out of the default per-sample cwd template so the subprocess inherits
  # ef's cwd (the plugin dir) and node can resolve the relative
  # fake-claude.js path.
  cwd: null
judge:
  provider: ollama
  model: q
  endpoint: JUDGE_URL
runs:
  samples: 2
  parallel: 1
snapshots:
  dir: ./snaps
